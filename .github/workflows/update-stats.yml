name: Daily NBA Stats Update

on:
  schedule:
    - cron: '0 8 * * *' # Runs daily at 8:00 AM UTC (1:00 AM PST)
  workflow_dispatch: # Allows manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/requirements.txt

      - name: Compile dataset
        run: |
          python data-pipeline/compile_dataset.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add public/data/
          git commit -m "Auto-update NBA player stats [skip ci]" || echo "No changes to commit"
          git push
