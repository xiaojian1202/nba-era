<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  fill="none"
>
  <title>Basketball (Flat Hardwood)</title>
  <!-- Ball body -->
  <circle cx="50" cy="50" r="45" fill="#C2410C" stroke="#0F172A" stroke-width="4" />
  <!-- Seams -->
  <path d="M50 5v90" stroke="#0F172A" stroke-width="4" stroke-linecap="round" />
  <path d="M5 50h90" stroke="#0F172A" stroke-width="4" stroke-linecap="round" />
  <path d="M18.2 18.2c12 12 12 51.6 0 63.6" stroke="#0F172A" stroke-width="4" stroke-linecap="round" />
  <path d="M81.8 18.2c-12 12-12 51.6 0 63.6" stroke="#0F172A" stroke-width="4" stroke-linecap="round" />
  <!-- Subtle shine -->
  <path d="M20 35 A 35 35 0 0 1 50 12 A 40 40 0 0 0 20 35" fill="#FFFFFF" opacity="0.15" />
